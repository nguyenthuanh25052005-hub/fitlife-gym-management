<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trainer Dashboard | FitLife</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <header class="navbar">
        <div class="container nav-wrap">
            <a href="./index.html" class="brand">
                <span class="brand-mark">F</span>
                <span>FitLife</span>
            </a>
            <nav class="nav-links">
                <a href="./trainer.html">Dashboard</a>
                <button id="logoutButton" class="link-button" type="button">Đăng xuất</button>
            </nav>
        </div>
    </header>

    <main class="dashboard-shell dashboard-shell-wide">
        <section class="container dashboard-hero card">
            <div>
                <p class="eyebrow">Trainer dashboard</p>
                <h1 id="trainerName">Xin chào</h1>
                <p id="trainerEmail" class="muted"></p>
            </div>
            <div class="hero-summary">
                <div class="stat-card compact">
                    <span class="stat-label">Lịch hôm nay</span>
                    <strong id="scheduleToday">0</strong>
                </div>
            </div>
        </section>

        <section class="container section-block">
            <div class="card">
                <div class="section-heading">
                    <p class="eyebrow">Lịch huấn luyện</p>
                    <h2>Quản lý buổi tập của bạn</h2>
                </div>
                <p id="trainerMessage" class="message"></p>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Thành viên</th>
                                <th>Ngày</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                                <th>Ghi chú</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="trainerScheduleTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/trainer.js"></script>
</body>

</html>
